<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Outer circle background -->
  <circle cx="100" cy="100" r="100" fill="#1a3a6b"/>

  <!-- Inner white circle -->
  <circle cx="100" cy="100" r="92" fill="white"/>

  <!-- Thin blue ring -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="#1a3a6b" stroke-width="3"/>

  <!-- ── SHIELD ── -->
  <!-- Shield outer shape -->
  <path d="M100 28 L130 38 L130 80 Q130 108 100 122 Q70 108 70 80 L70 38 Z"
        fill="#1a3a6b" stroke="#1a3a6b" stroke-width="1"/>
  <!-- Shield inner left half (silver/light) -->
  <path d="M100 30 L100 120 Q78 107 72 82 L72 40 Z"
        fill="#c8d4e8"/>
  <!-- Shield inner right half (blue) -->
  <path d="M100 30 L128 40 L128 82 Q122 107 100 120 Z"
        fill="#1a3a6b"/>
  <!-- Shield divider line -->
  <line x1="100" y1="30" x2="100" y2="120" stroke="white" stroke-width="1.5"/>
  <!-- Shield top banner -->
  <rect x="72" y="30" width="56" height="10" rx="2" fill="#1a3a6b"/>
  <text x="100" y="38.5" text-anchor="middle" font-family="Arial" font-size="5" font-weight="bold" fill="white" letter-spacing="0.5">EDUCATE TO NURTURE</text>

  <!-- C on left half of shield -->
  <text x="88" y="72" text-anchor="middle" font-family="Arial Black, Arial" font-size="22" font-weight="900" fill="#1a3a6b">C</text>
  <!-- U on right half of shield -->
  <text x="112" y="72" text-anchor="middle" font-family="Arial Black, Arial" font-size="22" font-weight="900" fill="white">U</text>

  <!-- ── OPEN BOOK below shield ── -->
  <path d="M72 128 Q100 122 128 128" fill="none" stroke="#1a3a6b" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M72 133 Q100 127 128 133" fill="none" stroke="#1a3a6b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="100" y1="122" x2="100" y2="134" stroke="#1a3a6b" stroke-width="1.5"/>

  <!-- ── LEFT LION ── -->
  <g transform="translate(52,55) scale(0.55)">
    <!-- Body -->
    <ellipse cx="20" cy="42" rx="14" ry="10" fill="#1a3a6b"/>
    <!-- Head -->
    <circle cx="8" cy="28" r="10" fill="#1a3a6b"/>
    <!-- Mane -->
    <circle cx="8" cy="28" r="13" fill="none" stroke="#1a3a6b" stroke-width="4"/>
    <!-- Front legs -->
    <rect x="4" y="48" width="5" height="14" rx="2" fill="#1a3a6b"/>
    <rect x="12" y="46" width="5" height="16" rx="2" fill="#1a3a6b" transform="rotate(-15,14,46)"/>
    <!-- Back legs -->
    <rect x="26" y="48" width="5" height="14" rx="2" fill="#1a3a6b"/>
    <!-- Tail -->
    <path d="M34 38 Q44 30 42 20 Q40 14 46 12" fill="none" stroke="#1a3a6b" stroke-width="3" stroke-linecap="round"/>
    <!-- Tail tuft -->
    <circle cx="46" cy="11" r="4" fill="#1a3a6b"/>
    <!-- Eye -->
    <circle cx="5" cy="26" r="1.5" fill="white"/>
  </g>

  <!-- ── RIGHT LION (mirrored) ── -->
  <g transform="translate(148,55) scale(-0.55,0.55)">
    <!-- Body -->
    <ellipse cx="20" cy="42" rx="14" ry="10" fill="#1a3a6b"/>
    <!-- Head -->
    <circle cx="8" cy="28" r="10" fill="#1a3a6b"/>
    <!-- Mane -->
    <circle cx="8" cy="28" r="13" fill="none" stroke="#1a3a6b" stroke-width="4"/>
    <!-- Front legs -->
    <rect x="4" y="48" width="5" height="14" rx="2" fill="#1a3a6b"/>
    <rect x="12" y="46" width="5" height="16" rx="2" fill="#1a3a6b" transform="rotate(-15,14,46)"/>
    <!-- Back legs -->
    <rect x="26" y="48" width="5" height="14" rx="2" fill="#1a3a6b"/>
    <!-- Tail -->
    <path d="M34 38 Q44 30 42 20 Q40 14 46 12" fill="none" stroke="#1a3a6b" stroke-width="3" stroke-linecap="round"/>
    <!-- Tail tuft -->
    <circle cx="46" cy="11" r="4" fill="#1a3a6b"/>
    <!-- Eye -->
    <circle cx="5" cy="26" r="1.5" fill="white"/>
  </g>

  <!-- ── TEXT ── -->
  <text x="100" y="150" text-anchor="middle" font-family="Arial Black, Arial" font-size="11" font-weight="900" fill="#1a3a6b" letter-spacing="1">CAVENDISH</text>
  <text x="100" y="163" text-anchor="middle" font-family="Arial Black, Arial" font-size="11" font-weight="900" fill="#1a3a6b" letter-spacing="1">UNIVERSITY</text>
  <text x="100" y="175" text-anchor="middle" font-family="Arial" font-size="9" font-weight="600" fill="#1a3a6b" letter-spacing="3">UGANDA</text>
</svg>
